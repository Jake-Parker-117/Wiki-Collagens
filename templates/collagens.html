<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collagen Finder</title>
    <link href="{{ url_for('static', filename='styles/style.css')}}" rel="stylesheet" />
</head>
<body>
    <h1> {{ title }} </h1>
    <p>Number of sequences uploaded: {{ seqs }}</p>
    <p>Number of sequences with collagen sequences (min length 27 amino acids): {{ collagen_num }}</p>
    
    <ul>
        <li><a href="{{ url_for('outputs', filename='col.txt') }}">View collagen txt file</a></li>
        <li><a href="{{ url_for('outputs', filename='col_html.html') }}">View collagens highlighted in an html file</a></li>
    </ul>

    <form action="/Collagens" method="POST" enctype="multipart/form-data">
        <input type="file" name="fasta_seqs" placeholder="Insert fasta file here!" accept=".fasta,.fa,.faa,.txt" />
        <button type="submit">Find Collagens</button>
    </form>
</body>
</html>
