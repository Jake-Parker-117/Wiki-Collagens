<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Collagens</title>
    <link href="{{ url_for('static', filename='styles/style.css')}}" rel="stylesheet" />
</head>

<body>

    <header>
        <div class="header_brand">
            <h1 class="wiki">Wiki</h1>
            <h1 class="collagens">Collagens</h1>
        </div>
        <nav>    
            <ul class="nav_list">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('documentation') }}">Documentation</a></li>
                <li><a href="{{ url_for('citation') }}">Citation</a></li>

    <main>
        <h1 class="page_header">I'm Sorry</h1>
        <div class="intro">
            <p class="error">
                Something went wrong. Please try again.<br /><br />
                Error: {{ e_title }}<br />
                Error Message: {{ e_msg }}<br /><br />
            </p>
        <div>

        <form action="/">
            <button type="submit">Return to home page</button>
        </form>
        
    </main>

    <footer>Wiki Collagens by Jordi Bella and Jacob Parker</footer>
</body>
</html>
